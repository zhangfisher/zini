# 应用程序配置文件
# 这是生产环境的配置示例

# 数据库服务器地址
# @title 数据库主机
db_host = localhost

# 数据库端口号
# @title 数据库端口
db_port = 5432

# 数据库名称
# @title 数据库名
db_name = myapp

# 连接超时时间（秒）
# @title 连接超时
db_timeout = 30

[server]
# 服务器监听地址
# @title 监听地址
host = 0.0.0.0

# 服务器监听端口
# @title 监听端口
port = 8080

# 启用HTTPS
# @title 启用HTTPS
ssl_enabled = true

[logging]
# 日志级别：debug, info, warn, error
# @title 日志级别
level = info

# 日志文件路径
# @title 日志文件
file = /var/log/myapp.log
