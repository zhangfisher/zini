# @title 数据库名
# 数据库名称
db_name = myapp
# @title 连接超时
# 连接超时时间（秒）
db_timeout = 30
# @title 数据库端口
# 数据库端口号
db_port = 5432
# @title 数据库主机
# 应用程序配置文件
# 这是生产环境的配置示例
# 数据库服务器地址
db_host = test.example.com

[server]
# @title 启用HTTPS
# 启用HTTPS
ssl_enabled = true
# @title 监听地址
# 服务器监听地址
host = 0.0.0.0
# @title 监听端口
# 服务器监听端口
port = 8080

[logging]
# @title 日志文件
# 日志文件路径
file = /var/log/myapp.log
# @title 日志级别
# 日志级别：debug, info, warn, error
level = info

